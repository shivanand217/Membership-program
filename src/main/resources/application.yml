spring:
  application:
    name: firstclub-membership

  datasource:
    url: jdbc:h2:mem:membership;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ---- Application (business) configuration ----
membership:
  # Single business timezone that defines the "per month" window for tier criteria.
  business-zone: Asia/Kolkata
  currency: INR
  # A single global cap (in currency units) on stacked percentage discounts in the order preview.
  discount:
    global-max: 1500
  expiry:
    # Cron for the lifecycle sweep (expire / renew / apply-deferred-downgrade). Every minute for the demo.
    sweep-cron: "0 * * * * *"
    enabled: true

logging:
  level:
    com.firstclub.membership: INFO
